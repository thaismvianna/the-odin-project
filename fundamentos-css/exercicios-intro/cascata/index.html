<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrigir Cascata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p class="para">Sou um parágrafo com negrito</p>
    <p class="para small-para">Sou um parágrafo pequeno, e também com negrito.</p>

    <button id="confirma-button" class="button confirm">Confirma</button>
    <button id="cancela-button" class="button cancel">Cancela</button>

    <div class="text">Sou uma div com texto pequeno.</div>
    <div class="text">Sou uma div com texto pequeno e um div filha.
      <div class="text child">Sou uma div filha com negrito.</div>
    </div>
</body>
</html>
